server {
    listen PORT_PLACEHOLDER;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ─── 301 REDIRECTS — consolidation Phase 1A (2026-04-19) ───
    # Literal-twin article pairs. Donor URL → survivor URL. Preserves SEO juice.
    location = /understanding-the-illinois-biometric-information-privacy-act-1.html {
        return 301 /understanding-the-illinois-biometric-information-privacy-act.html;
    }
    location = /top-dwi-lawyer-austin-effective-defense-strategies-for-your-case-1.html {
        return 301 /top-dwi-lawyer-austin-effective-defense-strategies-for-your-case.html;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
