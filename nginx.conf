server {
    listen PORT_PLACEHOLDER;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Emit relative redirects so CF Worker/browser can resolve against the public host,
    # not the internal Railway hostname:8080 that nginx would otherwise inject.
    absolute_redirect off;
    port_in_redirect off;

    # ─── 301 REDIRECTS — consolidation (2026-04-19) ───
    # Literal-twin article pair. CF Redirect Rules already handle the DWI cluster
    # at edge (including -1 variant), so nginx only needs the BIPA pair.
    location = /understanding-the-illinois-biometric-information-privacy-act-1.html {
        return 301 /understanding-the-illinois-biometric-information-privacy-act.html;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
